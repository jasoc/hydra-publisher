<mat-sidenav-container class="app-shell">
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="sidebar-header">
      <mat-icon class="app-icon">storefront</mat-icon>
      <span class="app-title">Hydra</span>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/import" routerLinkActive="active">
        <mat-icon matListItemIcon>add_photo_alternate</mat-icon>
        <span matListItemTitle>Import</span>
      </a>
      <a mat-list-item routerLink="/catalog" routerLinkActive="active">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Catalog</span>
      </a>
      <a mat-list-item routerLink="/publish" routerLinkActive="active">
        <mat-icon matListItemIcon>publish</mat-icon>
        <span matListItemTitle>Publish</span>
      </a>
      <a mat-list-item routerLink="/ai" routerLinkActive="active">
        <mat-icon matListItemIcon>auto_awesome</mat-icon>
        <span matListItemTitle>AI</span>
      </a>
      <a mat-list-item routerLink="/settings" routerLinkActive="active">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
