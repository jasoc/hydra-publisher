name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: hydra-publisher/src-tauri -> target

      - name: Set app version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node -e "
          const fs = require('fs');
          const v = process.env.VERSION;

          const confPath = 'hydra-publisher/src-tauri/tauri.conf.json';
          const conf = JSON.parse(fs.readFileSync(confPath, 'utf8'));
          conf.version = v;
          fs.writeFileSync(confPath, JSON.stringify(conf, null, 2) + '\n');

          const pkgPath = 'hydra-publisher/package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = v;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install frontend dependencies
        working-directory: hydra-publisher
        run: npm install

      - name: Build Tauri app and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: hydra-publisher
          tagName: v${{ inputs.version }}
          releaseName: 'Hydra Publisher v${{ inputs.version }}'
          releaseDraft: true
          prerelease: false
